name: Core simulator checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate JSON contracts
        run: |
          python -m json.tool contracts/task-manifest.schema.json > /dev/null
          python -m json.tool contracts/examples/private-code-task.json > /dev/null

      - name: Validate offline UI prototype
        run: python prototypes/ui-prototype/validate.py

      - name: Run core simulator tests
        run: python -m unittest discover -s prototypes/core_simulator/tests -v

      - name: Run routing demonstration
        run: python prototypes/core_simulator/demo.py

      - name: Restore production core
        run: dotnet restore AstilCodex.sln

      - name: Build production core
        run: dotnet build AstilCodex.sln --configuration Release --no-restore

      - name: Run production core self-tests
        run: dotnet run --project tests/AstilCodex.Core.SelfTest --configuration Release --no-build
